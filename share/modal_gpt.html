<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modal Fix Sample</title>

<link rel="stylesheet" href="stylesheet.css">

<style>
</style>
</head>

<body>

    <dialog id="modal" class="custom-modal" data-modal="demo">
        <button class="close-btn" data-modal-close></button>
    </dialog>

    <script src="modal.js"></script>
    <script>
        const modal = document.getElementById('modal');
        window.addEventListener('load', () => {
            modal.textContent = "閉じるボタンのクリッピング問題を解消した構造。\ndialog直配置ではなく内側コンテナを分離している。";
            modal.showModal();
        });
    </script>

</body>
</html>
