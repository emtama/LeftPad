<!--
index.htmlはGithubpagesで最初に読み込まれる。
-->
<!DOCTYPE html>
<html>
<head>
    <!-- PWAbuilderにmanifest.jsonの位置を教える -->
    <link rel="manifest" href="manifest.json">
    <!-- スタイルシートを読みこむ -->
    <link rel="stylesheet" href="./css/stylesheet.css">
</head>
<body>
    <!-- UI表示はしない -->
</body>
    <script>
        // index.html の script 部分
        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const ip = params.get('ip') || localStorage.getItem('server_ip');
            const token = params.get('token') || localStorage.getItem('auth_token');

            if (ip && token) {
                localStorage.setItem('server_ip', ip);
                localStorage.setItem('auth_token', token);
                
                location.href = `gesture_input.html`; 
            } else {
                location.href = 'pairing.html';
            }
        });
    </script>
</body>
</html>
