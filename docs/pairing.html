<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <title>LEFTPAD Pairing</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-user-select: none; user-select: none; }
        #qr-reader-window { width: 100%; border-radius: 1rem; overflow: hidden; }
        #qr-reader-window video { border-radius: 1rem; }
    </style>
</head>
<body class="bg-base-100 min-h-screen flex flex-col items-center p-6">

    <dialog id="modalDialog" class="modal">
      <div class="modal-box border border-primary text-center">
        <h3 id="modal-text" class="font-bold text-lg"></h3>
        <div class="modal-action justify-center">
          <form method="dialog">
            <button class="btn btn-primary">OK</button>
          </form>
        </div>
      </div>
    </dialog>

    <div class="w-full max-w-md flex flex-col items-center gap-8">
        <div class="flex flex-col items-center gap-2">
            <div class="avatar placeholder">
                <div class="bg-primary text-primary-content rounded-full w-16">
                    <span class="text-2xl font-bold">LP</span>
                </div>
            </div>
            <h1 class="text-3xl font-black tracking-tighter">LEFTPAD</h1>
            <div class="badge badge-outline opacity-50 uppercase tracking-widest text-[10px]">Pairing Mode</div>
        </div>

        <div id="qr-container" class="card bg-base-200 w-full shadow-xl border border-base-300">
            <div class="card-body items-center text-center p-6">
                <div class="flex items-center gap-2 mb-4 text-primary">
                    <span class="material-symbols-outlined">qr_code_scanner</span>
                    <h2 class="card-title text-sm">QRスキャン</h2>
                </div>
                <div id="qr-reader-window" class="bg-black aspect-square mb-4 border-2 border-primary/20"></div>
                <p class="text-xs opacity-60">PCアプリに表示されたQRコードを<br>枠内に収めてください</p>
            </div>
        </div>

        <div id="url-container" class="hidden card bg-base-200 w-full shadow-xl border border-base-300">
            <div class="card-body p-6">
                <h2 class="card-title text-sm mb-4 flex items-center gap-2">
                    <span class="material-symbols-outlined">link</span> 手動接続
                </h2>
                <div class="form-control gap-4">
                    <input type="text" id="manual-url" placeholder="http://192.168..." class="input input-bordered w-full" />
                    <button class="btn btn-primary w-full" onclick="manualConnect()">
                        <span class="material-symbols-outlined">bolt</span> 接続
                    </button>
                    <button class="btn btn-ghost btn-sm" onclick="startQRScan()">
                        QRスキャンを再試行
                    </button>
                </div>
            </div>
        </div>
        
        <div id="loading-spinner" class="hidden flex flex-col items-center gap-2">
            <span class="loading loading-ring loading-lg text-primary"></span>
            <span class="text-xs opacity-50">接続中...</span>
        </div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        //=============================================================
        //	モーダルの表示
        //=============================================================
        const modal = document.getElementById('modalDialog');
        const modalText = document.getElementById('modal-text');
        
        function showMsg(msg) {
            modalText.textContent = msg;
            modal.showModal();
        }


        //=============================================================
        //	グローバル変数
        //  - ネットワーク認証関係
        //=============================================================

        let serverIp = localStorage.getItem('server_ip');
        let authToken = localStorage.getItem('auth_token');
        const WS_PORT = 8765;

        //=============================================================
        //	初期化
        //  最初にHTML,CSS,JSが読み込まれたときに実行
        //=============================================================
        window.addEventListener('load', () => {
            // サーバIPと認証トークンがすでにローカルにあるならそれで接続を試し成功なら操作画面に遷移
            // そうでないならQRスキャン開始

            if (serverIp && authToken) {
                try {
                    authenticateWebSocket(serverIp, authToken);
                    location.href = "gesture_input.html";
                } catch(e) {
                    startQRScan();
                }
            } else {
                startQRScan();
            }
        });
        //=============================================================
        //	URL文字列からIPとトークン文字列を抽出する関数
        //=============================================================
        function decodeURLtoIPandToken(https_url){
            const u = new URL(https_url);
            const ip = u.searchParams.get("ip");
            const token = u.searchParams.get("token");
            return { ip, token };
        }

        let qr_scanner = null;
        let scanning = false;
        function startQRScan() {
            // すでに起動中なら何もしない
            if (scanning) return;
            // UIの切り替え
            document.getElementById('url-container').classList.add('hidden');
            document.getElementById('qr-container').classList.remove('hidden');
            // スキャナーインスタンスの作成
            qr_scanner = new Html5Qrcode("qr-reader-window");

            qr_scanner.start(
                { facingMode: "environment" }, // 背面カメラの使用      
                { fps: 10, qrbox: { width: 500, height: 500 } }, // fpsとQR認識範囲の設定
                // 読み取り成功時に呼び出す処理
                (decodedText) => {
                    console.log("Read: ", decodedText);
                    try {
                        const { ip, token } = decodeURLtoIPandToken(decodedText);
                        console.log(`ip ${ip} token ${token}`);

                        if (ip && token) {
                            console.log("StopQRScanner");
                            qr_scanner.stop();
                            scanning = false;
                            console.log("connect ws");
                            authenticateWebSocket(ip, token);
                        }
                    } catch (e) {
                        showMsg("有効でないQRコードです");
                    }
                }
            ).then(() => { 
                // 立ち上げに成功したら
                scanning = true; 
            })
            .catch(err => {
                scanning = false;
                showMsg("カメラの起動に失敗しました");
                document.getElementById('url-container').classList.remove('hidden');
                document.getElementById('qr-container').classList.add('hidden');
            });
        }
        //=============================================================
        //	手動でURLを入力して接続する
        //=============================================================
        function manualConnect() {
            const inputText = document.getElementById('manual-url').value;
            try {
                console.log("[QR] inputText:", inputText);
                const { ip, token } = decodeURLtoIPandToken(inputText);
                console.log("[QR] parsed:", { ip, token });
                if (ip && token) {
                    authenticateWebSocket(ip, token);
                }

            } catch(e) { showMsg("URLの形式が正しくありません"); }
        }
        //=============================================================
        //	WebSocketを用いて認証を行い、成功したら操作画面に遷移する
        //=============================================================
        function authenticateWebSocket(ip, token) {      
            // 
            console.log(`start authentication.`);
            //
            document.getElementById('loading-spinner').classList.remove('hidden');
            //
            const wsUrl = `wss://${ip}:${WS_PORT}`; // 修正: wssからwsへ（ローカル開発想定）
            const ws = new WebSocket(wsUrl);
            console.log(`websocket instance made. wsUrl: ${wsUrl}`);
            // 
            ws.onopen = () => {
                ws.send(JSON.stringify({
                    type:'auth', token
                }));
            };
            console.log(`send authentication message.`);
            // 
            ws.onmessage = (e) => {
                let d; 
                try{d=JSON.parse(e.data)}catch{return}
                if(d.type==='auth'){
                    if(d.ok) {
                        localStorage.setItem('server_ip', ip);
                        localStorage.setItem('auth_token', token);                   
                        location.href = `gesture_input.html?token=${token}`;
                    } else {
                        showMsg("認証に失敗しました");
                        document.getElementById('loading-spinner').classList.add('hidden');
                    }
                }
            };
            console.log(`send authentication message.`);
            // 
            ws.onclose = () => {
                console.log("WS Close");
            };
        }
    </script>
</body>
</html>
