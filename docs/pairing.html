<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./css/stylesheet.css">
    <style>
        *{
            /*テキストの選択を禁止 */
            -webkit-user-select: none; /* Safari / iOS */
            -ms-user-select: none;     /* 旧Edge */
            user-select: none;         /* 標準 */
        }
        body{
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center;
        }
        /* 全体のコンテナ */
        #qr-reader-window{
            width: 60vw;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- ポップアップ -->
         <dialog id="modalDialog" class="custom-modal" data-modal="demo">
            <button class="close-btn" data-modal-close></button>
            <!-- テキストは document.getelementbyid(id).textcontentから設定する -->
        </div> 

        <!-- ローディング表示 -->
         <div class="spinner" id="loading-spinner" style="display: none;"></div>

        <h1>LEFTPAD</h1>
        
        <h2>ペアリング</h2>

        <div class="container" id="qr-container"> 
            <p>PC側アプリのQRコードをスキャンしてペアリングする</p> 
            <div id="qr-reader-window">
                <!-- カメラ画面を移すためのdiv -->
            </div>            
        </div>

        <div class="container" id="url-container" style="display: none;">
            <p>PC側アプリのURLを入力してペアリングする</p>
            <div class="container">
                <input class="txtbox" type="text" id="manual-url" placeholder="テキストボックスの例"/>
                <button id="connect-btn" class="btn btn-primary" onclick="manualConnect()">
                    接続
                </button>
                <button id="scan-btn" class="btn btn-primary" onclick="startQRScan()">
                    QRスキャン再試行
                </button>
            </div>
        </div>

    </div>

    <!-- qrコード読み取り用のライブラリ -->
    <script src="js/modal.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>

        const modalDialog = document.getElementById('modalDialog')
        let serverIp = localStorage.getItem('server_ip');
        let authToken = localStorage.getItem('auth_token');
        const WS_PORT = 8765;

        //=============================================================
        // ページ読み込み時に認証を試行し失敗時QR撮影を開始
        // DOMContentLoadedはHTMLが読み込まれたら実行	
        // loadはHTML,CSS, JSなど読み込まれたら実行
        //=============================================================
        window.addEventListener('DOMContentLoaded', () => {

        });

        window.addEventListener('load', () => {
            // 認証情報があるなら認証を試みる
            if (serverIp && authToken) {
                if (connectWebSocket(serverIp, authToken)){
                    location.href = "smartphone.html";
                }             
            }
            // QR撮影開始のダイアログ
            modalDialog.textContent = "QRを撮影してペアリングします";
            modalDialog.showModal();
            // もし認証情報がないならQR撮影に入る
            startQRScan();

        });
        //=============================================================
        //	画面のどこかがクリックされているならダイアログを閉じる
        //=============================================================
        window.addEventListener('click', () => {
            const modalDialog = document.getElementsByClassName('dialog');
            // もしダイアログが開いているなら閉じる
            modalDialog.close();
        })

        //=============================================================
        //	HTTPSのURLから
        //=============================================================
        function decodeURLtoIPandToken(https_url){
            // QRの内容が http://192.168.1.5:8080/smartphone.html?ip=192.168.1.5&token=... 形式と想定
            
            const u = new URL(https_url);
            const ip = u.searchParams.get("ip");
            const token = u.searchParams.get("token");
            return { ip, token };
        }
        //=============================================================
        //	QRスキャンでURLを取得
        //=============================================================
        let qr_scanner = null;
        let scanning = false;   // スキャン中かどうか
        function startQRScan() {
            if (scanning) return;   // すでにスキャンしているならばreturn
           
            const height = document.documentElement.clientHeight;// 画面の高さ

            qr_scanner = new Html5Qrcode("qr-reader-window");

            qr_scanner.start(
                { facingMode: "environment" },             
                { 
                    fps: 10, 
                    qrbox: { 
                        width: 0.3 * height,
                        height: 0.3 * height
                    }  
                }, 
                // qrを検出した時呼ぶ
                (decodedText) => {
                    try {
                        const { ip, token } = decodeURLtoIPandToken(decodedText);
                        
                        if (ip && token) {
                            qr_scanner.stop();
                            scanning = false;
                            connectAndSave(ip, token);
                        }
                    } catch (e) {
                        // エラーが出た場合ポップアップ表示
                        modalDialog.textContent = "有効でないQRコードです";
                        modalDialog.showModal();
                    }
                }
            ).then(() => {
                // カメラ起動に成功した直後に1回だけ実行
                // 
                scanning = true;
            }).catch(err => {
                // qr_scanner.startに失敗
                scanning = false;
                modalDialog.textContent = "カメラの起動に失敗しました";
                modalDialog.showModal();
                qr_scanner.stop();
                //
                document.getElementById('url-container').style.display = 'flex';
                document.getElementById('qr-container').style.display = 'none';
            });
        }
        
        //=============================================================
        //	手動でURLを取得
        //=============================================================
        function manualConnect() {
            const urltext = document.getElementById('url-container').value;
            const { ip, token } = decodeURLtoIPandToken(urltext);
            
            if (ip && token) {
                connectAndSave(ip, token);
            }
        }

        //=============================================================
        //	WSで認証した後、認証成功うしたらIPとトークンを保存する関数
        //=============================================================
        function connectAndSave(ip, token) {      

            // サーバーへの接続wssURLを作成
            wsURL = `wss://${self.ip}:${WS_PORT}`;
            // 接続時にトークンを送信するなどの認証処理をここに追加
            ws = new WebSocket(wsUrl);
            
            ws.onopen = () => {
                // 最初にトークンを送って認証
                ws.send(JSON.stringify({type:'auth', token}));
            };

            // 返信を受け取る
            ws.onmessage = (e)=>{
            let d; try{d=JSON.parse(e.data)}catch{return} // メッセージをjsonに変換
            // 認証結果を受け取って処理
            if(d.type==='auth'){
                isAuthed=!!d.ok;// 真理値に変換
                if(isAuthed) {       
                    // 認証成功したらIPとトークンを保存                    
                    localStorage.setItem('server_ip', ip);
                    localStorage.setItem('auth_token', token);                   
                    // 操作画面へ移行
                    location.href = `smartphone.html`; // smartphone.html側でURLからトークンを拾うロジックに合わせて
                }else{
                    // 認証に失敗した場合URL入力に戻る
                    modalDialog.textContent = "認証に失敗しました";
                    modalDialog.showModal();

                }
                return;
            }            
            
            ws.onclose = () => {
                // 切断されたら再試行
                isAuthed=false; 
                setTimeout(connectAndSave(ip, token), 1500);
            };
        }
    }

    </script>
</body>
</html>
