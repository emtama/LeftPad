<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <!-- google font symbols & icons -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LeftPad gesture_stat</title>
  <!-- スタイルシートを読みこむ -->
  <link rel="stylesheet" href="./css/stylesheet.css">
  <!--  -->
  <style>
    :root {
      --dummy: 0;
    }

    /* レイアウトとインタラクションスタイル */
    * { 
      -webkit-tap-highlight-color: transparent; /* タップ時のグレーや青のハイライトが表示されなくなる */
      /*テキストの選択を禁止 */
      -webkit-user-select: none; /* Safari / iOS */
      -ms-user-select: none;     /* 旧Edge */
      user-select: none;         /* 標準 */
    }
    body { 
      margin: 0; /* 余白０ */
      overflow:hidden; /* はみ出したコンテンツを非表示にして、スクロールバーも非表示 */
    }
    /* タイトルと接続表示関係 */
    #overlay-ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      pointer-events: none; /* タッチを邪魔しない */
    }
    .title { color:var(--color-main); font-weight:700; font-size:22px; letter-spacing:1px; }
    .status { display:flex; gap:8px; align-items:center; color:var(--color-muted); font-size:12px; }
    .dot { width:10px; height:10px; border-radius:999px; background:var(--color-muted); }
    .dot.on { background:var(--color-success); box-shadow:0 0 8px var(--color-success)20%; }

    /* メインエリアとジェスチャーUIスタイル */
    main { padding:0; }
    
    /* IDセレクタ */
    #gesture_stat-canvas { 
      position:fixed; inset:0; background:var(--color-surfaces); touch-action:none; overflow:hidden; 
    }/* ジェスチャーエリアの位置ヒントテキスト */
    .hint { position:absolute; color:var(--color-muted); font-size:11px; letter-spacing:1px; }
    .top{top:12px;left:50%;transform:translateX(-50%)} .bottom{bottom:12px;left:50%;transform:translateX(-50%)}
    .left{left:12px;top:50%;transform:translateY(-50%)} .right{right:12px;top:50%;transform:translateY(-50%)}
    /* フィードバック表示 */
    #feedback { 
      position:absolute; 
      top:50%; left:50%; 
      transform:translate(-50%,-50%) scale(0.9); 
      opacity:0; 
      background:var(--color-main); 
      color:black; 
      padding:10px 18px; 
      border-radius:999px; 
      font-weight:700; 
      transition:.12s;
      z-index: 3;
     }
    #feedback.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    /* 対角線キャンバススタイル */
    #diagonal-canvas {
      position: absolute;/* ジェスチャーエリア全体を覆うキャンバス */
      inset: 0; /* 全面に広げる */
      z-index: 1;           /* split-line(=2)より下 */
      pointer-events: none; /* タッチを邪魔しない */
    }
    /* タッチインジケータ */
    .touch-indicator {
      position: absolute;
      width: 44px; height: 44px; margin-left: -22px; margin-top: -22px;
      border-radius: 999px; border: 3px solid color-mix(in srgb, var(--color-accent2) 70%, white);
      background: rgba(var(--color-accent2), 50);
      pointer-events: none;
      box-shadow: 0 0 0 2px rgba(var(--color-accent2), 50), 0 0 12px var(--color-accent2);
      transform: scale(0.85);
      transition: transform .16s, opacity .22s;
      opacity: 1;
      z-index: 5;
    }
    .touch-indicator.up {
      opacity: 0;
      transform: scale(1.35);
    }
  </style>
</head>
<body>
  <div id="overlay-ui">
  <div class="title">LEFTPAD</div>
  <div class="status">
    <span id="state">接続中...</span>
    <span id="dot" class="dot"></span>
  </div>
  </div>
  <main>
    <section id="gesture_stat-canvas">
      <canvas id="diagonal-canvas"></canvas> <!-- 対角線を描画するキャンバス -->

      <span class="hint top">UP</span>
      <span class="hint bottom">DOWN</span>
      <span class="hint left">LEFT</span>
      <span class="hint right">RIGHT</span>

      <div id="feedback"></div><!-- フィードバック表示 -->
    </section>
  </main>

  <script>

  // ══════════════════════════════════════════════
  // 描画：対角線
  // ══════════════════════════════════════════════

  // 対角線の描画
  const diagCanvas = document.getElementById("diagonal-canvas");
  const diagCtx = diagCanvas.getContext("2d");
  // 画面サイズに合わせてキャンバスをリサイズして対角線を描画する関数
  function resizeDiagonal() {
    const parent = document.getElementById("gesture_stat-canvas");
    diagCanvas.width = parent.clientWidth;
    diagCanvas.height = parent.clientHeight;
    drawDiagonal();
  }
  // 対角線を描画する関数
  function drawDiagonal() {
    const w = diagCanvas.width;
    const h = diagCanvas.height;

    diagCtx.clearRect(0, 0, w, h);

    diagCtx.beginPath();
    // 左上 → 右下
    diagCtx.moveTo(0, 0);
    diagCtx.lineTo(w, h);

    // 右上 → 左下
    diagCtx.moveTo(w, 0);
    diagCtx.lineTo(0, h);

    diagCtx.strokeStyle = "#2a2d36";
    diagCtx.lineWidth = 6;
    diagCtx.stroke();
  }
  // 画面サイズに合わせて対角線キャンバスをリサイズして再描画
  window.addEventListener("resize", resizeDiagonal);
  resizeDiagonal();


  // ══════════════════════════════════════════════
  // 機能：画面向き固定
  // ══════════════════════════════════════════════

  async function lockOrientation() {
    try {
        if (screen.orientation && screen.orientation.lock) {
            // 縦向きに固定したい場合: 'portrait'
            // 横向きに固定したい場合: 'landscape'
            await screen.orientation.lock('portrait');
            console.log("画面を縦向きに固定しました");
        }
    } catch (e) {
        console.warn("画面の向きロックに失敗しました:", e);
    }
  }
  // ページ読み込み時に実行
  window.addEventListener('load', lockOrientation);

  // ══════════════════════════════════════════════
  // 機能：フルスクリーン
  // 戻る・ホーム・タスクボタンブロック
  // ══════════════════════════════════════════════

  function requestFullScreen() {
    const doc = document.documentElement;
    if (doc.requestFullscreen) {
        doc.requestFullscreen();
    } else if (doc.webkitRequestFullscreen) { /* Safari */
        doc.webkitRequestFullscreen();
    }
  }

  // ユーザーが画面のどこかを触った瞬間にフルスクリーン化
  // （ブラウザの仕様で、ユーザーの操作を起点にする必要があります）
  window.addEventListener('touchstart', () => {
      if (!document.fullscreenElement) {
          requestFullScreen();
      }
  }, { once: true });

  // ══════════════════════════════════════════════
  // WebSocket通信
  // ══════════════════════════════════════════════

  // WebSocket接続とジェスチャー処理の実装
  const token = new URLSearchParams(location.search).get('token') || '';
  const wsHost = location.hostname || location.host.split(':')[0];
  const wsUrl = `ws://${wsHost}:8765`;
  let ws = null, isAuthed = false;
  let vibrationEnabled = true;
  const stateEl = document.getElementById('state');
  const dotEl = document.getElementById('dot');
  const feedbackEl = document.getElementById('feedback');

  // gestureのラベル（後でサーバーから受け取る）
  let gesture_labels_jp = {};
  // ジェスチャーとコマンドの対応表（後でサーバーから受け取る）
  let gesture_shortcuts = {};

  /* 
  初期化WebSocket接続とメッセージ処理
  メッセージはJSON形式で、typeフィールドで種類を判別する。例: {type:'auth', data/token:XXX}
  */
  function initial_connect(){
    ws = new WebSocket(wsUrl);// websocketインスタンス
    // 接続開始時は「接続中...」と表示
    setConn(false, '接続中...');
    // 接続が開いたら認証トークンを送る
    ws.onopen = ()=> ws.send(JSON.stringify({type:'auth', token}));
    // メッセージ受信時の処理
    ws.onmessage = (e)=>{
      let d; try{d=JSON.parse(e.data)}catch{return} // メッセージをjsonに変換
      // 認証結果を受け取って処理
      if(d.type==='auth'){
        isAuthed=!!d.ok;
        setConn(isAuthed, isAuthed?'接続済み':'認証失敗');
        return;
      }
      // （初回接続時）セットアップデータを受け取る
      if(d.type==='initial_auth_setup'){ 
        gesture_shortcuts = d.gesture_shortcuts || {};
        gesture_labels_jp = d.gesture_labels || {}; 
        vibrationEnabled = !!d.vibration_enabled; 
        reportVibrationStatus(true);// スマホ側の振動対応可否を送り返す
        // カラーパレットの適応
        const root = document.documentElement;
        for (const [key, value] of Object.entries(d.colors)) {
            root.style.setProperty(`--${key}`, value);
        }
      }
      //（随時）設定値の更新通知を受け取る（例: vibration_enabledの変更）
      if(d.type==='vibration_setting_updated'){ 
        vibrationEnabled = !!d.data;         
        reportVibrationStatus(true);  // スマホ側の振動対応可否を送り返す
      }
      // （随時）ジェスチャーのマッピングが更新された場合に新しいマッピングを反映する
      if (d.type==='gesture_updated') {
        gesture_shortcuts = d.data || {};
      }
    };
    ws.onclose = ()=>{ isAuthed=false; setConn(false,'未接続'); setTimeout(initial_connect, 1500); };
  }

  // 接続状態表示の更新
  function setConn(ok, msg){ 
    stateEl.textContent=msg; 
    dotEl.className = ok ? 'dot on':'dot'; 
  }

  // サーバーへデータを送信
  function send(obj){ 
    if(ws && ws.readyState===1 && isAuthed) ws.send(JSON.stringify(obj)); 
  }

  // ジェスチャーに対応するコマンドを送信
  function sendCommand(gesture_name){
    if (gesture_shortcuts[gesture_name]){// コマンドがある場合のみ送信
      send({"type": "gesture_detected", "gesture_name": gesture_name});
      vibrateTap();
    }
    const gestureLabel = gesture_labels_jp[gesture_name] || 'unknown';
    flash_feedback_text(gestureLabel);
  }

  // ══════════════════════════════════════════════
  // 振動
  // ══════════════════════════════════════════════

  // 振動フィードバック
  function vibrateTap(){
    if(!vibrationEnabled) return;
    const v = navigator.vibrate || navigator.webkitVibrate;
    if(v) return v.call(navigator, [20]);
    return false;
  }
  // 振動の利用可否を報告
  let vibrationReported = false;
  function reportVibrationStatus(force = false){
    if(!force && vibrationReported) return;
    if(!ws || ws.readyState !== WebSocket.OPEN) return;

    const supported = typeof navigator.vibrate === 'function';

    let allowed = false;
    if(supported){
      try {
        allowed = navigator.vibrate(1) === true;
      } catch {
        allowed = false;
      }
    }

    send({
      type: 'vibration_status',
      supported,
      allowed
    });

    vibrationReported = true;
  }


  // ══════════════════════════════════════════════
  // ジェスチャー関係の動的UI
  // ══════════════════════════════════════════════

  // 認識したジェスチャーのラベルをフィードバック表示
  const FLASH_DURATION_MS = 300;// フィードバックテキストを表示してから消すまでの時間[ms]
  function flash_feedback_text(t){ 
    feedbackEl.textContent=t; 
    feedbackEl.classList.add('show'); 
    setTimeout(()=>feedbackEl.classList.remove('show'), FLASH_DURATION_MS); 
  }
  
  // タッチインジケーターの更新とクリーンアップ
  function updateTouchIndicators(touchList){
    const activeIds = new Set();
    for(const t of touchList){
      activeIds.add(t.identifier);
      let el = touchIndicators.get(t.identifier);
      if(!el){
        el = document.createElement('div');
        el.className = 'touch-indicator';
        canvas.appendChild(el);
        touchIndicators.set(t.identifier, el);
      }
      const rect = canvas.getBoundingClientRect();
      el.style.left = `${t.clientX - rect.left}px`;
      el.style.top = `${t.clientY - rect.top}px`;
    }
    for(const [id, el] of touchIndicators.entries()){
      if(!activeIds.has(id)){
        el.classList.add('up');
        setTimeout(()=>el.remove(), 280);
        touchIndicators.delete(id);
      }
    }
  }


  // ══════════════════════════════════════════════
  // ジェスチャーの認識と判定
  // ══════════════════════════════════════════════
  let longPressTimer = null;  // 長押し判定用タイマー
  let lastTapTime  = 0; // 連続タップの判定用

  const SWIPE_THRESHOLD_RATIO  = 0.20;  // スワイプと判定する最小移動距離の画面幅・高さに対する比率
  const PINCH_OUT_THRESHOLD_RATIO  = 1.5; // ピンチアウトと判定する最小の距離の増大比率
  const PINCH_IN_THRESHOLD_RATIO  = 0.7; // ピンチインと判定する最大の距離の減少比率
  const PINCH_THRESHOLD_DIST_RATIO = 0.1;// ピンチ判定を入れる最小の距離の画面幅・高さに対する比率
  const LONG_PRESS_MS    = 600; // 長押しと判定するための最小時間（ミリ秒）
  const DOUBLE_TAP_MS    = 300; // ダブルタップと判定する最大間隔（ミリ秒）
  const TAP_SEQUENCE_MS  = 250;  // 指が増えても一連のジェスチャーに含める最大間隔（ミリ秒）
  const canvas = document.getElementById('gesture_stat-canvas');
  let gesture_stat = null; // 現在進行中のジェスチャー状態を保持するオブジェクト
  const touchIndicators = new Map();// タッチIDとインジケーター要素のマップ

  // タップ位置から上下左右のどの領域かを判定
  function getTapRegion(x, y){
    const w = window.innerWidth;
    const h = window.innerHeight;

    // 対角線の傾き
    const k = h / w;

    const diag1 = k * x;         // 左上 → 右下
    const diag2 = h - k * x;     // 左下 → 右上

    if (y < diag1 && y < diag2) {
      return 'top';
    }
    if (y > diag1 && y > diag2) {
      return 'bottom';
    }
    if (y > diag1 && y < diag2) {
      return 'left';
    }
    return 'right';
  }

  // タッチの中心点を計算
  function calcCenterFromTouches(touches){
    if(!touches || touches.length === 0) return null;
    let sx=0, sy=0;
    for(const t of touches){ sx += t.clientX; sy += t.clientY; }
    return {x: sx / touches.length, y: sy / touches.length};
  }

  /*
  2点間の距離を計算
  */
  function distance(t1, t2){
    if(!t1 || !t2) return 0;
    return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
  }


  // ピンチジェスチャーの検出
  function detectPinch(gesture_stat){
    // ピンチは2本指のみで判定
    if(gesture_stat.maxTouches !== 2) return '';

    const w = window.innerWidth;
    const startDist = gesture_stat.startDist;
    const lastDist   = gesture_stat.lastDist;  
    const delta = lastDist - startDist;
    const delta_ratio = lastDist/startDist;
    
    if (Math.abs(delta) > w * PINCH_THRESHOLD_DIST_RATIO){
      if (delta > 0){// 指の間の距離の最初と最後で何倍になったか？の比率が閾値を超えるか
        if (delta_ratio > PINCH_OUT_THRESHOLD_RATIO) return "pinch_out"
      }else{
        if (delta_ratio < PINCH_IN_THRESHOLD_RATIO) return 'pinch_in';
      }
   }
    return ''
  }

  // タップ回数管理
  let tapState = {
    lastTime: 0,
    count: 0,// 直近のタップ位置（連続タップの判定用）
    pos: null,
    timer: null
  };

  // タップの連続性を管理して、シングルタップ、ダブルタップ、トリプルタップを判定
  function handleTapSequence(gesture_stat, finger){
    const now = Date.now();
    const pos = gesture_stat.last;
    // 前回のタップ位置と今回のタップ位置が近いかどうかを判定（40px以内）
    const near = tapState.pos &&
      Math.hypot(pos.x - tapState.pos.x, pos.y - tapState.pos.y) < 40;
    // 前回のタップからの時間と位置が近い場合はカウントを増やす、そうでない場合はリセットして1からスタート
    if(now - tapState.lastTime < DOUBLE_TAP_MS && near){
      tapState.count++;
    } else {
      tapState.count = 1;
    }

    tapState.lastTime = now;
    tapState.pos = pos;

    const region = getTapRegion(pos.x, pos.y);

    clearTimeout(tapState.timer);

    // タップの種類を判定するために少し待つ（ダブルタップやトリプルタップの可能性を考慮）
    return new Promise(resolve=>{
      tapState.timer = setTimeout(()=>{
        let type = 'tap';
        if(tapState.count === 2) type = 'double_tap';
        if(tapState.count >= 3) type = 'triple_tap';

        resolve(`${finger}_${type}_${region}`);
        tapState.count = 0;
      }, 260);
    });
  }

  /*
  ジェスチャーの分類とコマンド送信
  */
  function classifyGesture(gesture_stat){
    const dt = Date.now() - gesture_stat.startAt;

    const first = Object.values(gesture_stat.starts)[0];
    if(!first) return '';

    const w = window.innerWidth;
    const dx = gesture_stat.lastCenter.x - gesture_stat.startCenter.x;
    const dy = gesture_stat.lastCenter.y - gesture_stat.startCenter.y;
    const adx = Math.abs(dx);
    const ady = Math.abs(dy);
    const dist = Math.hypot(dx, dy);

    const finger = getFingerPrefix(gesture_stat);
    
    // ピンチを優先に判定する
    //
    const pinch = detectPinch(gesture_stat);
    if(pinch){
      return pinch;
    }

    // --- スワイプ ---
    if (adx > w * SWIPE_THRESHOLD_RATIO){// ある程度移動している
      if (adx > ady) {
        const dir = dx > 0 ? 'right' : 'left';
        return `${finger}_swipe_${dir}`;
      }
    }
    if (ady > w * SWIPE_THRESHOLD_RATIO){
      if(ady > adx){
        const dir = dy > 0 ? 'down' : 'up';
        return `${finger}_swipe_${dir}`;
      }      
    }    
    
    // --- 長押し ---
    if(dt > LONG_PRESS_MS){
      const region = getTapRegion(gesture_stat.last.x, gesture_stat.last.y);
      return `${finger}_long_press_${region}`;
    }

    // --- タップ（回数管理） ---
    return handleTapSequence(gesture_stat, finger);
  }

  // 指の本数に応じたプレフィックスを取得
  function getFingerPrefix(gesture_stat){
    const count = Math.max(gesture_stat.count, gesture_stat.maxTouches);
    if(count === 1) return 'single_finger';
    if(count === 2) return 'two_finger';
    if(count === 3) return 'three_finger';
    return '';
  }

  /* 
  タッチ開始イベント（指が増えた）
  ※e.touchesは指が降れた順に格納される。例えば、人差し指（[0]）、中指（[1]）、薬指（[2]）の順で置いて、中指（[1]）を離す。すると、それまで [2] だった薬指が [1] に繰り上がる。インデックスでなく、.identifierで識別すること。
  */
  canvas.addEventListener('touchstart', (e)=>{
    // インジケータの更新
    updateTouchIndicators(e.touches);
    vibrateTap(); // 振動させる
    // 現在ジェスチャーがなく、かつ指の本数が1〜3本の場合に新しいジェスチャーを開始
    if(!gesture_stat && (e.touches.length===1 || e.touches.length===2 || e.touches.length===3)){
      const starts = {};
      for (const t of e.touches) starts[t.identifier] = {x:t.clientX, y:t.clientY};
      gesture_stat = {// ジェスチャー状態の初期化
        count: e.touches.length,// 開始時の指の本数
        maxTouches: e.touches.length,// ジェスチャー中に増えた指の本数（長押し誤判定回避用）
        startAt: Date.now(),// ジェスチャー開始時刻
        starts,// 各指の開始位置 {id: {x, y}}
        lastPositions: Object.fromEntries(Array.from(e.touches).map(t => [t.identifier, {x:t.clientX, y:t.clientY}])),  // 各指の最後の位置
        last: {x:e.touches[e.touches.length-1].clientX, y:e.touches[e.touches.length-1].clientY}, // 最後に触れた指の位置
        startCenter: calcCenterFromTouches(e.touches),
        lastCenter: calcCenterFromTouches(e.touches),
        startDist: e.touches.length>=2 ? distance(e.touches[0], e.touches[1]) : 0,  // ピンチイン、ピンチアウト計算用。第１指と第２指との距離（初めて２本の指で触れた時）
        lastDist: e.touches.length>=2 ? distance(e.touches[0], e.touches[1]) : 0, // ピンチイン、ピンチアウト計算用。第１指と第２指との距離（最後に２本の指で触れた時）
      };
    } else if(gesture_stat) {// 本数が増えた場合
      // 最大の本数を更新
      gesture_stat.maxTouches = Math.max(gesture_stat.maxTouches, e.touches.length);
      // ごく短い時間に本数が増えた場合、「開始時の本数」を現在の本数で上書きする
      if (e.touches.length > gesture_stat.count && (Date.now() - gesture_stat.startAt) < TAP_SEQUENCE_MS) {
        gesture_stat.count = e.touches.length;
        // もし２本に増えた場合、startDist, lastDistを計算する（ピンチアウト、ピンチイン計算のため）
        if (gesture_stat.count == 2){
          gesture_stat.startDist = distance(e.touches[0], e.touches[1]);
          gesture_stat.lastDist = distance(e.touches[0], e.touches[1]);
        }
        // とにかく本数が増えた場合
        gesture_stat.startCenter = calcCenterFromTouches(e.touches);
        gesture_stat.lastCenter = calcCenterFromTouches(e.touches);
      }
      
    }
    // ジェスチャー状態の更新
    for (const t of e.touches){// 各指の開始位置と最新位置を更新
      // 未登録の指の場合、開始位置として記録
      if(!gesture_stat.starts[t.identifier]) gesture_stat.starts[t.identifier] = {x:t.clientX, y:t.clientY};
      // 最新の指の位置を記録
      gesture_stat.lastPositions[t.identifier] = {x:t.clientX, y:t.clientY};// 各指の最後の位置
    }
    // 最後に触れた指の位置
    gesture_stat.last = {x:e.touches[e.touches.length-1].clientX, y:e.touches[e.touches.length-1].clientY};
    // 
    gesture_stat.lastCenter = calcCenterFromTouches(e.touches) || gesture_stat.lastCenter;
    // 指が二本以上ならlastDistを更新
    if(e.touches.length>=2) gesture_stat.lastDist = distance(e.touches[0], e.touches[1]);
  }
  , {passive:true});

  /* 
  タッチ移動イベント （指が動いた）
  */
  canvas.addEventListener('touchmove', (e)=>{
    // インジケータの更新
    updateTouchIndicators(e.touches);
    // 指が１本以上ついていて、ジェスチャーが継続している
    if(gesture_stat && e.touches.length > 0){
      const t = e.touches[0];
      gesture_stat.last = {x:t.clientX, y:t.clientY};
      gesture_stat.maxTouches = Math.max(gesture_stat.maxTouches, e.touches.length);
      // 全ての指について、最後の位置を更新
      for (const tt of e.touches){
        gesture_stat.lastPositions[tt.identifier] = {x:tt.clientX, y:tt.clientY};
      }
      // lastCensetを更新
      gesture_stat.lastCenter = calcCenterFromTouches(e.touches) || gesture_stat.lastCenter;
      // 二本以上ならlastDistを更新
      if(e.touches.length>=2) gesture_stat.lastDist = distance(e.touches[0], e.touches[1]);
    }
    if(gesture_stat && (gesture_stat.maxTouches > 1 || e.touches.length > 1)) clearTimeout(longPressTimer);
  }, {passive:true});

  /* 
  タッチ終了イベント 
  */
  canvas.addEventListener('touchend', async (e)=>{
    // 
    updateTouchIndicators(e.touches);
    clearTimeout(longPressTimer);

    if(!gesture_stat) return;// ジェスチャー状態がない場合は何もしない
    if(e.touches.length > 0) return;// まだ指が残っている場合はジェスチャーを確定しない

    const result = classifyGesture(gesture_stat);

    if(result instanceof Promise){
      const key = await result;
      sendCommand(key);
    } else {
      sendCommand(result);
    }
    // ジェスチャーを空にする
    gesture_stat = null;
  }, {passive:true});

  // タッチキャンセルイベント（例: システムによる割り込みなど）
  canvas.addEventListener('touchcancel', (e)=>{
    updateTouchIndicators(e.touches);
    clearTimeout(longPressTimer);
    gesture_stat = null;
  }, {passive:true});

  // ══════════════════════════════════════════════
  // htmlを取得した時、接続を試みる
  // ══════════════════════════════════════════════
  initial_connect();
  </script>
</body>
</html>
