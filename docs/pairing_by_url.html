<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="./css/stylesheet.css">
    <style>
        *{
            /*テキストの選択を禁止 */
            -webkit-user-select: none; /* Safari / iOS */
            -ms-user-select: none;     /* 旧Edge */
            user-select: none;         /* 標準 */
        }
        body{
            display:flex; 
            flex-direction:column; 
            align-items:center; 
            justify-content:center;
        }
        /* 全体のコンテナ */
        .panel{
            margin: 10px;
            padding: 10px;
            inset: 0px;
            border: 0;
            border-radius: 10px;
            background-color: var(--color-surface);
            display: flex;
            flex-direction:column; 
            align-items:center; 
            justify-content:center;

        }
        .connect-box{
            display: flex;
            flex-direction: row;
            align-items: center;
            margin: auto; 
            color:var(--color-text-dim);
        }
        #qr-reader-window{
            width: 60vw;
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- 追加：ポップアップ -->
        <dialog id="popup">
            <p id="popup-text"></p>
            <button onclick="closePopup()">OK</button>
        </dialog>

        <h1>LEFTPAD</h1>
        
        <h2>ペアリング</h2>
        <div class="panel"> 
            <p>PC側アプリのQRコードをスキャンしてペアリングする</p> 
            <div id="qr-reader-window">
                <!-- カメラ画面を移すためのdiv -->
            </div>
            <button id="scan-btn" class="btn btn-primary" onclick="startQRScan()">
                QRスキャン開始
            </button>
            <!-- 手動パネルに再試行ボタン追加 -->
            <button onclick="startQRScan()">QRで再試行</button>
        </div>

        <div class="panel">
            <p>PC側アプリのURLを入力してペアリングする</p>
            <div class="connect-box">
                <input type="text" id="manual-url" class="txtbox" placeholder="テキストボックスの例"/>
                <button id="connect-btn" class="btn btn-primary" onclick="manualConnect()">
                    接続
                </button>
            </div>
        </div>
    </div>

    <!-- qrコード読み取り用のライブラリ -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>

        let serverIp = localStorage.getItem('server_ip');
        let authToken = localStorage.getItem('auth_token');

        // 起動時のチェック
        window.addEventListener('load', () => {
            if (serverIp && authToken) {
                // 認証情報があるなら認証する
                document.getElementById('pairing-overlay').style.display = 'none';
                connectWebSocket(serverIp, authToken);
            }
            // もし認証情報がないならQR撮影に入る
            showPopup("QRを撮影してペアリングします");
            startQRScan();
        });
        
        // QRスキャン開始
        let qr_scanner;
        let scanning = false;
        function startQRScan() {
            if (scanning) return;

            qr_scanner = new Html5Qrcode("qr-reader-window");
            const config = { fps: 10, qrbox: { width: 250, height: 250 } };

            qr_scanner.start(
                { facingMode: "environment" },             
                { fps: 10, 
                    qrbox: { width: 250, height: 250 } 
                }, 
                (decodedText) => {
                    // QRの内容が http://192.168.1.5:8080/smartphone.html?ip=192.168.1.5&token=... 形式と想定
                    try {
                        const url = new URL(decodedText);
                        const ip = url.searchParams.get("ip");
                        const token = url.searchParams.get("token");
                        
                        if (ip && token) {
                            qr_scanner.stop();
                            scanning = false;
                            saveAndConnect(ip, token);
                        }
                    } catch (e) {
                        showPopup("無効なQRコードです");
                    }
                }
            ).then(() => {
                scanning = true;
                // 成功時UI
                document.getElementById("scan-btn").style.display = "none";
            }).catch(err => {
                scanning = false;
                // 失敗時：原因表示
                showPopup("カメラ起動失敗: " + err);
                // 手動モードへ誘導
                document.getElementById("scan-btn").textContent = "QRで再試行";
            });
        }
        
        //
        function saveAndConnect(ip, token) {
            localStorage.setItem('server_ip', ip);
            localStorage.setItem('auth_token', token);
            
            // UIを隠して接続
            document.getElementById('pairing-overlay').style.display = 'none';
            connectWebSocket(ip, token);
        }

        // 手動入力の場合
        function manualConnect() {
            const ip = document.getElementById('manual-url').value;
            const token = prompt("認証トークンを入力してください（サーバー画面に表示されています）");
            if (ip && token) saveAndConnect(ip, token);
        }

        function connectWebSocket(ip, token) {
            const wsUrl = `ws://${ip}:8765`;
            // 接続時にトークンを送信するなどの認証処理をここに追加
            socket = new WebSocket(wsUrl);
            
            socket.onopen = () => {
                // 最初にトークンを送って認証
                socket.send(JSON.stringify({ type: 'auth', token: token }));
                updateStatus(true);
            };
            
            socket.onclose = () => {
                // 切断されたらペアリング画面を再表示するか、再試行
                updateStatus(false);
            };
    }

    </script>
</body>
</html>
