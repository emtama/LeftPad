<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <title>LEFTPAD Server</title>
    <style>
        * { -webkit-user-select: none; user-select: none; }
        .panel { display: none; }
        .panel.active { display: block; }
    </style>
</head>

<body class="flex h-screen overflow-hidden bg-base-100">

    <!-- サイドバー -->
    <div class="w-20 bg-base-200 flex flex-col items-center py-6 gap-6 shadow-lg">
        <div class="avatar placeholder mb-4">
            <div class="bg-primary text-primary-content rounded-full w-12">
                <span class="text-xs">LP</span>
            </div>
        </div>
        <button class="btn btn-ghost btn-circle" onclick="switchPanel('qr')" title="接続情報">
            <span class="material-symbols-outlined">devices</span>
        </button>
        <button class="btn btn-ghost btn-circle" onclick="switchPanel('key')" title="ジェスチャー">
            <span class="material-symbols-outlined">keyboard</span>
        </button>
        <button class="btn btn-ghost btn-circle" onclick="switchPanel('settings')" title="設定">
            <span class="material-symbols-outlined">settings</span>
        </button>
        <button class="btn btn-ghost btn-circle" onclick="switchPanel('logs')" title="ログ">
            <span class="material-symbols-outlined">terminal</span>
        </button>
    </div>

    <!-- メインコンテンツ -->
    <main class="flex-1 p-8 overflow-y-auto">
        
        <!-- 接続パネル -->
        <div id="panel-qr" class="panel active space-y-6">
            <h2 class="text-2xl font-bold border-b border-base-300 pb-2">デバイス接続</h2>
            
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <!-- QRコード -->
                <div class="card bg-base-200 shadow-xl overflow-hidden">
                    <div class="card-body items-center text-center">
                        <h3 class="card-title mb-4 text-sm opacity-70">スキャンして接続</h3>
                        <div class="bg-white p-4 rounded-xl inline-block">
                            <img id="qr-img" src="" alt="QR Code" class="w-48 h-48" />
                        </div>
                    </div>
                </div>

                <!-- 接続情報 -->
                <div class="space-y-4">
                    <div class="card bg-base-200 p-4 shadow-md">
                        <label class="text-xs font-bold opacity-50 mb-1">HTTP URL</label>
                        <div class="flex gap-2">
                            <code id="http-url" class="bg-base-300 p-2 rounded flex-1 truncate">読み込み中...</code>
                            <button class="btn btn-sm btn-square btn-outline" onclick="copyText('http-url')">
                                <span class="material-symbols-outlined text-sm">content_copy</span>
                            </button>
                        </div>
                    </div>
                    <div class="card bg-base-200 p-4 shadow-md border-l-4 border-primary">
                        <label class="text-xs font-bold opacity-50 mb-1">接続ステータス</label>
                        <div class="flex items-center gap-4">
                            <div id="client-count" class="text-4xl font-black text-primary">0</div>
                            <div class="text-sm">デバイス接続中</div>
                        </div>
                        <div id="client-list" class="mt-4 space-y-1 max-h-32 overflow-y-auto italic text-xs opacity-60">
                            <!-- クライアント名がここに挿入される -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ジェスチャー編集パネル -->
        <div id="panel-key" class="panel space-y-6">
            <div class="flex justify-between items-center border-b border-base-300 pb-2">
                <h2 class="text-2xl font-bold">ジェスチャー編集</h2>
                <div class="badge badge-primary">編集モード</div>
            </div>
            <div id="gesture-shortcut-editor" class="grid grid-cols-1 gap-3">
                <!-- server.js の renderGestures で生成 -->
            </div>
        </div>

        <!-- 設定パネル -->
        <div id="panel-settings" class="panel space-y-6">
            <h2 class="text-2xl font-bold border-b border-base-300 pb-2">基本設定</h2>
            <div class="card bg-base-200 p-6 space-y-4 max-w-md shadow-lg">
                <div class="form-control">
                    <label class="label cursor-pointer hover:bg-base-300 rounded-lg p-3 transition-colors">
                        <span class="label-text font-bold">ハプティクス（振動）</span>
                        <input type="checkbox" class="toggle toggle-primary" id="vib-toggle" onchange="toggleVib()" />
                    </label>
                </div>
                <div class="divider"></div>
                <div class="text-xs opacity-50 text-center">LEFTPAD v2.0 - DaisyUI Edition</div>
            </div>
        </div>

        <!-- ログパネル -->
        <div id="panel-logs" class="panel space-y-4 flex flex-col h-full">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-bold">システムログ</h2>
                <button class="btn btn-sm btn-outline btn-error" onclick="clearLogs()">クリア</button>
            </div>
            <div id="log-container" class="flex-1 bg-black text-success font-mono text-sm p-4 rounded-xl overflow-y-auto border border-base-300 shadow-inner min-h-[400px]">
                <!-- ログ内容 -->
            </div>
        </div>
    </main>

    <script src="server_daisyui.js"></script>
</body>
</html>
