<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- google font symbols & icons -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <!-- スタイルシートを読みこむ -->
    <link rel="stylesheet" href="../share/stylesheet.css">
    <style>
        :root {            
            --dummy: 0;
        }
        body {
            display: flex; /* 横並びにする */
            height: 100vh; /*  */
            margin: 0;
            overflow: hidden;
        }
        /* サイドバー */
        .sidebar {
            width: 80px;
            background: var(--color_surface);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            border-right: 1px solid var(--color_border);
        }
        .nav-item {
            width: 60px;
            height: 60px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border-radius: 8px;
            color: var(--color-text-light);
            transition: var(--transient-time);
            font-size: 12px;
        }
        .nav-item:hover { background: var(--color_border);}
        .nav-item.active { background: var(--color_accent);}
        .nav-item i { font-size: 24px; margin-bottom: 4px; }

        /* メインコンテンツ */
        .main-content {
            flex: 1;
            padding: 30px;
            overflow-y: auto;/* Y方向にあふれた時？あふれた時だけスクロールバー付ける */
            background: var(--color-bg);
        }
        
        /*  */
        .panel { display: none; }
        .panel.active { display: block; }


        /* 接続設定タブ */
        
        .connection-status-container{
            text-align: center; /* テキストを中央揃え */
            justify-content: center;
            padding: 1em; 
            background: var(--color_bg); 
            border-radius: 8px;
            margin: 0.5em; 
            width: fit-content;   /* 中身の幅に合わせる */
            height: fit-content;  /* 中身の高さに合わせる */
        }

        /* QRカード */
        #qr-img { 
            position: fixed;
            padding: 20px; 
            border-radius: 20px; 
            margin: 20px 0; 
            margin-left: auto;
            margin-right: auto;
            width: 250px;
            height: 250px;
            background: var(--color_surface);
            display: block;
        }

        /* URLテキストのスタイル（追加） */

        .url-container {
            display: flex;
            flex-direction: row; /* 横に並べる */
            align-items: center; /* 子要素をそれぞれ各バウンディングボックス内で上下中央揃え */
            justify-content: center;/* 子要素の塊を左右中央寄 */
            padding: 1em;
            background: var(--color_bg); 
            border-radius: 8px;
            margin: 0.5em;
        }

        .url-box{
            display: flex;
            flex-direction: column; /* 縦に並べる */
            align-items: center; /* 子要素を各バウンディングボックス内で上下中央揃え */
            justify-content: space-evenly;/* 上下左右等間隔に配置 */
            padding: 1em;
            background: var(--color_bg); 
            border-radius: 8px;
            margin: 0.5em;
        }

        .clickable-url {
            word-break: break-all; 
            color: var(--color_accent);
            cursor: pointer;
            padding: 10px;
            background: var(--color-bg);
            border-radius: 6px;
            border: 1px solid transparent;
            transition: all var(--transient-time);
            position: relative;
            display: block;
            text-align: center;
            width: fit-content;   /* 中身の幅に合わせる */
            height: fit-content;  /* 中身の高さに合わせる */
        }

        /* ホバー時に枠線と色を変える */
        .clickable-url:hover {
            border-color: var(--color_accent);
            background: var(--color_border);
        }

        /* コピーした瞬間の視覚効果 */
        .clickable-url:active {
            transform: scale(0.98);/*  */
            opacity: 0.8;
        }

        /* コピー完了通知（ツールチップ風） */
       .clickable-url.copied_tooltip::after {
            content: "コピーしました！";
            position: fixed;
            top: var(--my);
            left: var(--mx);
            transform: translate(-50%, -120%);
            background: var(--color_accent);
            color: var(--color-text-dim);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 14px;
            font-weight: bold;
            pointer-events: none;
        }
        
        /* ジェスチャー-ショートカット編集 */
        .gesture-row { display: flex; 
            align-items: center; 
            background: var(--color_surface); 
            margin-bottom: 8px; 
            padding: 10px; 
            border-radius: 8px; }
        .gesture-label { width: 150px; 
            font-weight: bold; 
            color: var(--color-text-dim); }
        .key-display { flex: 1; color: var(--color_accent); background: var(--color-bg); padding: 8px; border-radius: 4px; margin: 0 10px; min-height: 20px; }
        
        /* 設定ラベル */
        .setting-row { 
            display: flex; 
            align-items: center; 
            background: var(--color-bg); 
            padding: 0.5em; 
            border-radius: 8px;
        }
        .setting-text{    
            padding: 10px; 
            color: var(--color-text-dim); 
            display: flex;
            flex-direction: column; /* 縦並びにする */
            justify-content: center;/* 並べる方向の軸に対して中央揃え */
            margin-right: 15px; /* ボタン類とのマージン */
        }
        
        /* ログパネル専用 */
        #log-container {
            background: var(--color_surface);
            color: var(--color-text-dim);
            font-family: monospace;
            padding: 15px;
            height: 500px;
            overflow-y: scroll;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
        }

    </style>
</head>
<body>
    <div class="sidebar">
        <div class="nav-item active" onclick="switchPanel('qr')">
            <span class="material-symbols-outlined">devices</span>
        </div>
        <div class="nav-item" onclick="switchPanel('key')">
            <span class="material-symbols-outlined">keyboard</span>
        </div>
        <div class="nav-item" onclick="switchPanel('settings')">
            <span class="material-symbols-outlined">settings</span>
        </div>
        <div class="nav-item" onclick="switchPanel('logs')">  
            <span class="material-symbols-outlined">history</span>
        </div>
    </div>

    <div class="main-content">
        <div id="panel-qr" class="panel active">
            <h1>スマホとの接続</h1>
            <img id="qr-img"/>
            <div class="url-container">
                <div class="url-box">
                    <h2 style="text-align: center;">HTTP URL</h2>
                    <code id="http-url" class="clickable-url" onclick="copyHTTPURL()">読み込み中...</code>
                </div>
                <div class="url-box">
                    <h2 style="text-align: center;">WebSocket URL</h2>
                    <code id="ws-url" class="clickable-url" onclick="copyWSURL()">読み込み中...</code>
                </div>
            </div>
            <div class="connection-status-container">
                <h2>現在の接続数</h2>
                <h1 id="client-count">0</h1>
                <div id="client-list" style="font-size: 1em; color: var(--color_accent); margin-top: 5px;">
                    待機中...
                </div>
            </div>
        </div>

        <div id="panel-key" class="panel">
            <h1>ジェスチャー-ショートカット編集</h1>
            <div id="gesture-shortcut-editor"></div>
        </div>

        <div id="panel-settings" class="panel">
            <h1>アプリ設定</h1>
            <label class = "setting-row">
                <div class="setting-text">
                    <h2>ハプティクス</h2><br>
                    スマホをタップした時に振動させます。</p>
                </div>
                <label class="toggle-button-2">
                    <input type="checkbox" id="vib-toggle" onchange="toggleVib()"/>
                </label>

            </label>

        </div>

        <div id="panel-logs" class="panel">
            <h1>通信ログ</h1>
            <div id="log-container"></div>
            <button class="btn btn-danger" onclick="document.getElementById('log-container').innerHTML=''" style="margin-top:10px;" >
                ログをクリア
            </button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════
        // 初期化
        // ══════════════════════════════════════════════
        let gesture_shortcuts = {};
        let gesture_labels = {};
        let capturingKey = null;
        let pressedKeys = new Set(); // 現在押されているキーを保持

        // 初期化処理（サーバーから基本情報を受け取って設定）
        async function init() {
            try {
                
                const root = document.documentElement;  // :root 要素（html要素）を取得
                const styles = getComputedStyle(root);  // :root に適用されているすべてのスタイル計算値を取得
                const qr_fillcolor = "#000000";//styles.getPropertyValue('--color_main').trim();// 特定の変数名（例: --value）の値を抜き出す
                const qr_backcolor = "#ffffff";//styles.getPropertyValue('--color_surface').trim();// 特定の変数名（例: --value）の値を抜き出す
                //
                const data = await pywebview.api.get_init_data(qr_fillcolor, qr_backcolor);
                //
                document.getElementById('qr-img').src = 'data:image/png;base64,' + data.qr_image;
                document.getElementById('http-url').innerText = data.http_url;
                document.getElementById('ws-url').innerText = data.ws_url;
                document.getElementById('vib-toggle').checked = data.vibration;
                gesture_shortcuts = data.gesture_shortcuts;
                gesture_labels = data.gesture_labels;
                renderGestures(gesture_labels);

                // カラーパレットの適用
                if (data.colors) {
                    const root = document.documentElement;
                    for (const [key, value] of Object.entries(data.colors)) {
                        root.style.setProperty(`--${key}`, value);
                    }
                }

            } catch (e) {
                console.error("Init error:", e);
            }
        }
        // 接続ステータスアップデート
        function connectionStatsUpdate(stats) {
            try {                    
                // 端末数を更新
                document.getElementById('client-count').innerText = stats.count;
                
                // 端末IPリストを更新
                const listEl = document.getElementById('client-list');
                if (stats.count > 0) {
                    listEl.innerText = "接続中: " + stats.ips.join(', ');
                } else {
                    listEl.innerText = "接続されている端末はありません";
                }
            } catch (e) {
                console.error("Stats update error:", e);
            }
        }

        // pywebviewready のタイミングで実行開始
        window.addEventListener('pywebviewready', () => {
            init();
        });

        // ══════════════════════════════════════════════
        // 共通
        // ══════════════════════════════════════════════
        // マウスの位置を追跡
        document.addEventListener("mousemove", (e) => {
            document.documentElement.style.setProperty("--mx", e.clientX + "px");
            document.documentElement.style.setProperty("--my", e.clientY + "px");
            });
        // パネルを切り替える
        function switchPanel(panelId) {
            // 全パネルとナビボタンをリセット
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));

            // 選択されたものだけアクティブ化
            document.getElementById(`panel-${panelId}`).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // ══════════════════════════════════════════════
        // スマホ接続タブ
        // ══════════════════════════════════════════════
        
        // 2秒間だけ「Copied!」を表示する視覚演出
        function showCopyFeedback(element) {
            const wait_time = 500;
            element.classList.add('copied_tooltip');// "copied_tooltip"の名前の要素を::afterとして追加。
            setTimeout(() => {
                element.classList.remove('copied_tooltip');// "copied_tooltip"の名前の要素を::afterとして追加。
            }, wait_time);
        }
        // URLをクリップボードにコピーする関数
        async function copyHTTPURL() {
            const el = document.getElementById('http-url');
            const success = await pywebview.api.copy_to_clipboard(el.innerText);
            if (success) showCopyFeedback(el);
        }

        async function copyWSURL() {
            const el = document.getElementById('ws-url');
            const success = await pywebview.api.copy_to_clipboard(el.innerText);
            if (success) showCopyFeedback(el);
        }

        

        // ══════════════════════════════════════════════
        // ジェスチャー・ショートカットタブ
        // ══════════════════════════════════════════════
        // ジェスチャーとショートカットの対応を表示する関数
        function renderGestures(gesture_labels) {
            const container = document.getElementById('gesture-shortcut-editor');
            container.innerHTML = ''; // 再描画用
            Object.keys(gesture_labels).forEach(id => {
                const row = document.createElement('div');
                row.className = 'gesture-row';
                row.innerHTML = `
                    <div class="gesture-label">${gesture_labels[id]}</div>
                    <div class="key-display" id="display-${id}">${(gesture_shortcuts[id] || []).join(' + ')}</div>
                    <button onclick="startCapture('${id}')" class="btn btn-primary" id="btn-${id}">記録</button>
                    <button onclick="deleteGesture('${id}')" class="btn btn-danger"  id="btn-delete-${id}">削除</button>
                `;
                container.appendChild(row);
            });
        }
        // ジェスチャーに対応するキーの記録を開始する関数
        function startCapture(id) {
            if(capturingKey) return;
            capturingKey = id;
            pressedKeys.clear();
            const btn = document.getElementById(`btn-${id}`);
            btn.innerText = "キーを離して確定...";
            btn.classList.add('active');
        }
        // ジェスチャーに対応するキーの削除
        async function deleteGesture(id) {
            gesture_shortcuts[id] = []; // ローカルデータを空に
            document.getElementById(`display-${id}`).innerText = '';
            await pywebview.api.save_gesture_shortcut(id, []); // Python側へ空リストを送信
        }
        // 複数キー記録のロジック (keydown で蓄積、keyup で送信)
        window.addEventListener('keydown', (e) => {
            if(!capturingKey) return;
            e.preventDefault();

            // 修飾キーの正規化
            let key = e.key;
            if (key === "Control") key = "Ctrl";
            if (key === "Meta") key = "Win"; // Windowsキーなど

            pressedKeys.add(key);
            
            // リアルタイム表示用
            const display = Array.from(pressedKeys);
            document.getElementById(`display-${capturingKey}`).innerText = display.join(' + ');
        });
        
        window.addEventListener('keyup', (e) => {
            if(!capturingKey) return;
            
            // 全てのキーが離されたら確定して保存
            const finalKeys = Array.from(pressedKeys);
            if (finalKeys.length > 0) {
                saveAndFinish(capturingKey, finalKeys);
            }
            pressedKeys.clear();
        });
        // ジェスチャーに対応するキーの決定と保存
        async function saveAndFinish(id, keys) {
            gesture_shortcuts[id] = keys;
            await pywebview.api.save_gesture_shortcut(id, keys);
            
            const btn = document.getElementById(`btn-${id}`);
            btn.innerText = "記録";
            btn.classList.remove('active');
            capturingKey = null;
        }
        // ══════════════════════════════════════════════
        // 設定タブ
        // ══════════════════════════════════════════════
        // 振動の設定
        async function toggleVib() {
            const val = document.getElementById('vib-toggle').checked;
            await pywebview.api.toggle_vibration(val);
        }
        // ══════════════════════════════════════════════
        // ログタブ
        // ══════════════════════════════════════════════
        // Python側からログを受け取って表示する関数
        function addLog(message) {
            const container = document.getElementById('log-container');
            const entry = document.createElement('div');
            entry.textContent = message;
            container.appendChild(entry);            
            // 常に最新（一番下）にスクロール
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
</html>
