<!DOCTYPE html>
<html lang="ja" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Tailwind + DaisyUI CDN -->
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />

<!-- Icons -->
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />

<title>LEFTPAD</title>
</head>

<body class="flex h-screen overflow-hidden">

<!-- Sidebar -->
<div class="w-20 bg-base-200 flex flex-col items-center py-4 gap-4">
  <button class="btn btn-ghost" onclick="switchPanel('qr')">
    <span class="material-symbols-outlined">devices</span>
  </button>
  <button class="btn btn-ghost" onclick="switchPanel('key')">
    <span class="material-symbols-outlined">keyboard</span>
  </button>
  <button class="btn btn-ghost" onclick="switchPanel('settings')">
    <span class="material-symbols-outlined">settings</span>
  </button>
  <button class="btn btn-ghost" onclick="switchPanel('logs')">
    <span class="material-symbols-outlined">history</span>
  </button>
</div>

<!-- Main -->
<div class="flex-1 p-6 overflow-auto">
  <h1 class="text-2xl font-bold mb-4">LEFTPAD</h1>

  <!-- QR Panel -->
  <div id="panel-qr" class="panel space-y-4">
    <h2 class="text-xl font-semibold">スマホとの接続</h2>

    <div class="flex gap-6 items-center">
      <img id="qr-img" class="w-64 h-64 bg-base-300 rounded-box" />

      <div class="card bg-base-200 p-4">
        <h3 class="font-bold">HTTP URL</h3>
        <button id="http-url" class="btn btn-outline" onclick="copyHTTPURL()">読み込み中...</button>
      </div>

      <div class="card bg-base-200 p-4">
        <h3 class="font-bold">接続</h3>
        <div id="client-count" class="text-3xl">0</div>
        <div id="client-list" class="text-sm"></div>
        <span class="loading loading-spinner"></span>
      </div>
    </div>
  </div>

  <!-- Key Panel -->
  <div id="panel-key" class="panel hidden">
    <h2 class="text-xl font-semibold mb-4">ジェスチャー編集</h2>
    <div id="gesture-shortcut-editor" class="space-y-2"></div>
  </div>

  <!-- Settings Panel -->
  <div id="panel-settings" class="panel hidden">
    <h2 class="text-xl font-semibold mb-4">設定</h2>

    <div class="form-control w-64">
      <label class="label cursor-pointer">
        <span class="label-text">ハプティクス</span>
        <input type="checkbox" class="toggle toggle-primary" id="vib-toggle" onchange="toggleVib()" />
      </label>
    </div>
  </div>

  <!-- Logs Panel -->
  <div id="panel-logs" class="panel hidden">
    <h2 class="text-xl font-semibold mb-4">ログ</h2>

    <div id="log-container" class="bg-base-200 p-4 h-64 overflow-auto rounded-box font-mono text-sm"></div>

    <button class="btn btn-error mt-2" onclick="clearLogs()">ログをクリア</button>
  </div>

</div>

<script src="./server_daisyui.js"></script>

</body>
</html>
