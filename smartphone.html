<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LeftPad Gesture</title>
  <style>
    /* カラーテーマと基本スタイル */
    :root { --bg:#0d0e11; --surface:#16181e; --border:#2a2d36; --accent:#e8ff47; --accent2:#47c4ff; --text:#e4e6ee; --muted:#5a5f72; }
    /* レイアウトとインタラクションスタイル */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; overflow:hidden; }
    /* タイトルと接続表示関係 */
    #overlay-ui {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      pointer-events: none; /* タッチを邪魔しない */
    }
    .title { color:var(--accent); font-weight:700; font-size:22px; letter-spacing:1px; }
    .status { display:flex; gap:8px; align-items:center; color:var(--muted); font-size:12px; }
    .dot { width:10px; height:10px; border-radius:999px; background:var(--muted); }
    .dot.on { background:#4dff91; box-shadow:0 0 8px #4dff9180; }

    /* メインエリアとジェスチャーUIスタイル */
    main { padding:0; }
    
    /* IDセレクタ */
    #gesture-canvas { 
      position:fixed; inset:0; background:var(--surface); touch-action:none; overflow:hidden; 
    }/* ジェスチャーエリアの位置ヒントテキスト */
    .hint { position:absolute; color:var(--muted); font-size:11px; letter-spacing:1px; }
    .top{top:12px;left:50%;transform:translateX(-50%)} .bottom{bottom:12px;left:50%;transform:translateX(-50%)}
    .left{left:12px;top:50%;transform:translateY(-50%)} .right{right:12px;top:50%;transform:translateY(-50%)}
    /* フィードバック表示 */
    #feedback { 
      position:absolute; 
      top:50%; left:50%; 
      transform:translate(-50%,-50%) scale(0.9); 
      opacity:0; 
      background:var(--accent); 
      color:#000; 
      padding:10px 18px; 
      border-radius:999px; 
      font-weight:700; 
      transition:.12s;
      z-index: 3;
     }
    #feedback.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    /* 対角線キャンバススタイル */
    #diagonal-canvas {
      position: absolute;/* ジェスチャーエリア全体を覆うキャンバス */
      inset: 0; /* 全面に広げる */
      z-index: 1;           /* split-line(=2)より下 */
      pointer-events: none; /* タッチを邪魔しない */
    }
    /* タッチインジケータ */
    .touch-indicator {
      position: absolute;
      width: 44px; height: 44px; margin-left: -22px; margin-top: -22px;
      border-radius: 999px; border: 3px solid #7fdcff;
      background: #47c4ff55;
      pointer-events: none;
      box-shadow: 0 0 0 2px #0d0e11aa, 0 0 12px #47c4ff99;
      transform: scale(0.85);
      transition: transform .16s, opacity .22s;
      opacity: 1;
      z-index: 5;
    }
    .touch-indicator.up {
      opacity: 0;
      transform: scale(1.35);
    }

    /* ジェスチャーのヒントテキスト */
    #hint-display{
      position:absolute;/* ジェスチャーのヒントテキストを画面中央に配置 */
      top:50%;/*  */
      left:50%;
      transform:translate(-50%,-50%);
      background:var(--accent2);
      color:var(--text);
      padding:6px 12px;
      border-radius:10px;
      font-size:12px;
      opacity:0;
      transition:opacity .2s, transform .2s;
      pointer-events:none;
      z-index:3;
    }
    #hint-display.show{
      opacity:1;  /* 表示中は少し拡大して目立たせる */
      transform:translate(-50%,-50%) scale(1.05); /* 少し拡大して目立たせる */
    }
  
  </style>
</head>
<body>
  <div id="overlay-ui">
  <div class="title">LEFTPAD</div>
  <div class="status">
    <span id="state">接続中...</span>
    <span id="dot" class="dot"></span>
  </div>
  </div>
  <main>
    <section id="gesture-canvas">
      <canvas id="diagonal-canvas"></canvas> <!-- 対角線を描画するキャンバス -->

      <span class="hint top">UP</span>
      <span class="hint bottom">DOWN</span>
      <span class="hint left">LEFT</span>
      <span class="hint right">RIGHT</span>

      <!-- ジェスチャーのヒントテキスト -->
      <div id="hint-display"></div>

      <div id="feedback"></div><!-- フィードバック表示 -->
    </section>
  </main>

<script>

// 対角線の描画
const diagCanvas = document.getElementById("diagonal-canvas");
const diagCtx = diagCanvas.getContext("2d");
// 画面サイズに合わせてキャンバスをリサイズして対角線を描画する関数
function resizeDiagonal() {
  const parent = document.getElementById("gesture-canvas");
  diagCanvas.width = parent.clientWidth;
  diagCanvas.height = parent.clientHeight;
  drawDiagonal();
}
// 対角線を描画する関数
function drawDiagonal() {
  const w = diagCanvas.width;
  const h = diagCanvas.height;

  diagCtx.clearRect(0, 0, w, h);

  diagCtx.beginPath();
  // 左上 → 右下
  diagCtx.moveTo(0, 0);
  diagCtx.lineTo(w, h);

  // 右上 → 左下
  diagCtx.moveTo(w, 0);
  diagCtx.lineTo(0, h);

  diagCtx.strokeStyle = "#2a2d36";
  diagCtx.lineWidth = 6;
  diagCtx.stroke();
}
// 画面サイズに合わせて対角線キャンバスをリサイズして再描画
window.addEventListener("resize", resizeDiagonal);
resizeDiagonal();


// ジェスチャーのヒントテキストの描画
// ジェスチャーのキー配列を「Ctrl + Shift + A」のような形式に整形
function formatKeys(keys){
  if(!Array.isArray(keys)) return '';
  return keys.filter(k=>k).map(k=>k.toUpperCase()).join(' + ');
}
// 
function buildHintList(){

  function buildDisplayText(gestureKey){
    const label = gesture_labels_jp[gestureKey] || gestureKey || 'unknown';
    const keys  = formatKeys(gestureMap[gestureKey]);
    if(!keys) return '';
    return `${label}（${keys}）`;
  }

  const list = [];

  for(const key in gestureMap){
    const txt = buildDisplayText(key);
    if(!txt) continue;

    list.push(txt);
  }

  return list;
}

let hintIndex = 0;
let hintList = [];

const hintEl = document.getElementById("hint-display");
// 定期的にヒントテキストを更新して表示する関数
function showNextHint(){
  if(hintList.length === 0){
    hintList = buildHintList();
  }

  if(hintList.length === 0) return;

  const item = hintList[hintIndex % hintList.length];
  hintIndex++;

  hintEl.textContent = item;
  hintEl.classList.add("show");

  setTimeout(()=>{
    hintEl.classList.remove("show");
  }, 1200); // 表示時間
}
setInterval(showNextHint, 1600);

// WebSocket接続とジェスチャー処理の実装
const token = new URLSearchParams(location.search).get('token') || '';
const wsHost = location.hostname || location.host.split(':')[0];
const wsUrl = `ws://${wsHost}:8765`;
let ws = null, isAuthed = false;
let vibrationEnabled = true;
const stateEl = document.getElementById('state');
const dotEl = document.getElementById('dot');
const feedbackEl = document.getElementById('feedback');

// gestureのラベル（後でサーバーから受け取る）
let gesture_labels_jp = {};
// ジェスチャーとコマンドの対応表（後でサーバーから受け取る）
let gestureMap = {};

// 接続状態表示の更新
function setConn(ok, msg){ 
  stateEl.textContent=msg; 
  dotEl.className = ok ? 'dot on':'dot'; 
}

// フィードバック表示
const FLASH_DURATION_MS = 300;// フィードバックテキストを表示してから消すまでの時間[ms]
function flash_feedback_text(t){ 
  feedbackEl.textContent=t; 
  feedbackEl.classList.add('show'); 
  setTimeout(()=>feedbackEl.classList.remove('show'), FLASH_DURATION_MS); 
}

// サーバーへデータを送信
function send(obj){ 
  if(ws && ws.readyState===1 && isAuthed) ws.send(JSON.stringify(obj)); 
}

// ジェスチャーに対応するコマンドを送信
function sendCommand(cmd, gestureKey=''){
  const gestureLabel = gesture_labels_jp[gestureKey] || gestureKey || cmd || 'unknown';
  if (cmd){// コマンドがある場合のみ送信
    send({cmd, gesture: gestureKey});
    vibrateTap();
  }
  flash_feedback_text(gestureLabel);
}


// 振動フィードバック
function vibrateTap(){
  if(!vibrationEnabled) return;
  const v = navigator.vibrate || navigator.webkitVibrate;
  if(v) return v.call(navigator, [20]);
  return false;
}
// 振動の利用可否を報告
let vibrationReported = false;
function reportVibrationStatus(force = false){
  if(!force && vibrationReported) return;
  if(!ws || ws.readyState !== WebSocket.OPEN) return;

  const supported = typeof navigator.vibrate === 'function';

  let allowed = false;
  if(supported){
    try {
      allowed = navigator.vibrate(1) === true;
    } catch {
      allowed = false;
    }
  }

  send({
    type: 'vibration_status',
    supported,
    allowed
  });

  vibrationReported = true;
}

// タップ位置から上下左右のどの領域かを判定
function getTapRegion(x, y){
  const w = window.innerWidth;
  const h = window.innerHeight;

  // 対角線の傾き
  const k = h / w;

  const diag1 = k * x;         // 左上 → 右下
  const diag2 = h - k * x;     // 左下 → 右上

  if (y < diag1 && y < diag2) {
    return 'top';
  }
  if (y > diag1 && y > diag2) {
    return 'bottom';
  }
  if (y > diag1 && y < diag2) {
    return 'left';
  }
  return 'right';
}

// WebSocket接続とメッセージ処理
// メッセージはJSON形式で、typeフィールドで種類を判別する。例: {type:'auth', data/token:XXX}
function connect(){
  ws = new WebSocket(wsUrl);// websocketインスタンス
  // 接続開始時は「接続中...」と表示
  setConn(false, '接続中...');
  // 接続が開いたら認証トークンを送る
  ws.onopen = ()=> ws.send(JSON.stringify({type:'auth', token}));
  // メッセージ受信時の処理
  ws.onmessage = (e)=>{
    let d; try{d=JSON.parse(e.data)}catch{return} // メッセージをjsonに変換
    // 認証結果を受け取って処理
    if(d.type==='auth'){
      isAuthed=!!d.ok;
      setConn(isAuthed, isAuthed?'接続済み':'認証失敗');
      return;
    }
    // （初回接続時）ジェスチャーのマッピング情報を受け取る
    if(d.type==='gestures'){ 
      gestureMap = d.data || {};
      hintList = buildHintList();
      hintIndex = 0;
    }
    // （初回接続時）ジェスチャーのラベルを受け取る
    if(d.type==='gesture_labels'){ 
      gesture_labels_jp = d.data || {}; 
    }
    // （初回接続時）アプリの設定値を受け取る（例: vibration_enabled）
    // （随時）設定値の更新通知を受け取る（例: vibration_enabledの変更）
    if(d.type==='vibration_setting' || d.type==='vibration_setting_updated'){ 
      vibrationEnabled = !!d.data; 
      // スマホ側の振動対応可否を送り返す
      reportVibrationStatus(true);
    }
    // （随時）ジェスチャーのマッピングが更新された場合に新しいマッピングを反映する
    if (d.type == 'gesture_updated') {
      gestureMap = d.data || {};
      hintList = buildHintList();
      hintIndex = 0;
    }
  };
  ws.onclose = ()=>{ isAuthed=false; setConn(false,'未接続'); setTimeout(connect, 1500); };
}

// ── タッチイベント ──────────────────────────
let longPressTimer = null;  // 長押し判定用タイマー
let lastTapTime  = 0; // 連続タップの判定用

const SWIPE_THRESHOLD  = 40;  // スワイプと判定する最小移動距離（ピクセル）
const LONG_PRESS_MS    = 600; // 長押しと判定するための最小時間（ミリ秒）
const DOUBLE_TAP_MS    = 300; // ダブルタップと判定する最大間隔（ミリ秒）
const TAP_SEQUENCE_MS  = 250;  // 指が増えても一連のジェスチャーに含める最大間隔（ミリ秒）
const PINCH_THRESHOLD  = 0.25; // ratio change threshold

const canvas = document.getElementById('gesture-canvas');
let gesture = null; // 現在進行中のジェスチャー状態を保持するオブジェクト
const touchIndicators = new Map();// タッチIDとインジケーター要素のマップ

// タッチインジケーターの更新とクリーンアップ
function updateTouchIndicators(touchList){
  const activeIds = new Set();
  for(const t of touchList){
    activeIds.add(t.identifier);
    let el = touchIndicators.get(t.identifier);
    if(!el){
      el = document.createElement('div');
      el.className = 'touch-indicator';
      canvas.appendChild(el);
      touchIndicators.set(t.identifier, el);
    }
    const rect = canvas.getBoundingClientRect();
    el.style.left = `${t.clientX - rect.left}px`;
    el.style.top = `${t.clientY - rect.top}px`;
  }
  for(const [id, el] of touchIndicators.entries()){
    if(!activeIds.has(id)){
      el.classList.add('up');
      setTimeout(()=>el.remove(), 280);
      touchIndicators.delete(id);
    }
  }
}

// タッチの中心点を計算
function calcCenterFromTouches(touches){
  if(!touches || touches.length === 0) return null;
  let sx=0, sy=0;
  for(const t of touches){ sx += t.clientX; sy += t.clientY; }
  return {x: sx / touches.length, y: sy / touches.length};
}

// 2点間の距離を計算
function distance(t1, t2){
  if(!t1 || !t2) return 0;
  return Math.hypot(t2.clientX - t1.clientX, t2.clientY - t1.clientY);
}

// ジェスチャーの分類とコマンド送信
function classifyGesture(gesture){
  const dt = Date.now() - gesture.startAt;

  const first = Object.values(gesture.starts)[0];
  if(!first) return '';

  const dx = gesture.last.x - first.x;
  const dy = gesture.last.y - first.y;
  const adx = Math.abs(dx);
  const ady = Math.abs(dy);
  const dist = Math.hypot(dx, dy);

  const finger = getFingerPrefix(gesture);

  // --- スワイプ ---
  if(dist > SWIPE_THRESHOLD){
    const dir = adx > ady
      ? (dx > 0 ? 'right' : 'left')
      : (dy > 0 ? 'down' : 'up');

    return `${finger}_swipe_${dir}`;
  }

  // --- 長押し ---
  if(dt > LONG_PRESS_MS){
    const region = getTapRegion(gesture.last.x, gesture.last.y);
    return `${finger}_long_press_${region}`;
  }

  // --- タップ（回数管理） ---
  return handleTapSequence(gesture, finger);
}
// 指の本数に応じたプレフィックスを取得
function getFingerPrefix(gesture){
  const count = Math.max(gesture.count, gesture.maxTouches);
  if(count === 1) return 'single_finger';
  if(count === 2) return 'two_finger';
  if(count === 3) return 'three_finger';
  return '';
}
// タップ回数管理
let tapState = {
  lastTime: 0,
  count: 0,// 直近のタップ位置（連続タップの判定用）
  pos: null,
  timer: null
};

// タップの連続性を管理して、シングルタップ、ダブルタップ、トリプルタップを判定
function handleTapSequence(gesture, finger){
  const now = Date.now();
  const pos = gesture.last;
  // 前回のタップ位置と今回のタップ位置が近いかどうかを判定（40px以内）
  const near = tapState.pos &&
    Math.hypot(pos.x - tapState.pos.x, pos.y - tapState.pos.y) < 40;
  // 前回のタップからの時間と位置が近い場合はカウントを増やす、そうでない場合はリセットして1からスタート
  if(now - tapState.lastTime < DOUBLE_TAP_MS && near){
    tapState.count++;
  } else {
    tapState.count = 1;
  }

  tapState.lastTime = now;
  tapState.pos = pos;

  const region = getTapRegion(pos.x, pos.y);

  clearTimeout(tapState.timer);

  // タップの種類を判定するために少し待つ（ダブルタップやトリプルタップの可能性を考慮）
  return new Promise(resolve=>{
    tapState.timer = setTimeout(()=>{
      let type = 'tap';
      if(tapState.count === 2) type = 'double_tap';
      if(tapState.count >= 3) type = 'triple_tap';

      resolve(`${finger}_${type}_${region}`);
      tapState.count = 0;
    }, 260);
  });
}
// ピンチジェスチャーの検出
function detectPinch(gesture){
  // ピンチは2本指のみで判定
  if(gesture.maxTouches !== 2) return '';

  const startDist = gesture.startDist;
  const endDist   = gesture.lastDist;

  const delta = endDist - startDist;

  if(Math.abs(delta) < PINCH_THRESHOLD) return '';

  return delta > 0 ? 'pinch_out' : 'pinch_in';
}

// タッチ開始イベント
canvas.addEventListener('touchstart', (e)=>{
  updateTouchIndicators(e.touches);
  vibrateTap();
  // 現在ジェスチャーがなく、かつ指の本数が1〜3本の場合に新しいジェスチャーを開始
  if(!gesture && (e.touches.length===1 || e.touches.length===2 || e.touches.length===3)){
    const starts = {};
    for (const t of e.touches) starts[t.identifier] = {x:t.clientX, y:t.clientY};
    gesture = {// ジェスチャー状態の初期化
      count: e.touches.length,// 開始時の指の本数
      maxTouches: e.touches.length,// ジェスチャー中に増えた指の本数（長押し誤判定回避用）
      startAt: Date.now(),// ジェスチャー開始時刻
      starts,// 各指の開始位置 {id: {x, y}}
      lastPositions: Object.fromEntries(Array.from(e.touches).map(t => [t.identifier, {x:t.clientX, y:t.clientY}])),
      last: {x:e.touches[0].clientX, y:e.touches[0].clientY},
      startCenter: calcCenterFromTouches(e.touches),
      lastCenter: calcCenterFromTouches(e.touches),
      startDist: e.touches.length>=2 ? distance(e.touches[0], e.touches[1]) : 0,
      lastDist: e.touches.length>=2 ? distance(e.touches[0], e.touches[1]) : 0,
    };
  } else if(gesture) {// 途中で本数が増えたらジェスチャー種別を昇格（長押し誤判定回避）
    gesture.maxTouches = Math.max(gesture.maxTouches, e.touches.length);
    if (e.touches.length > gesture.count && (Date.now() - gesture.startAt) < TAP_SEQUENCE_MS) {
      gesture.count = e.touches.length;
    }
  }
  // ジェスチャー状態の更新
  if(gesture){
    gesture.maxTouches = Math.max(gesture.maxTouches, e.touches.length);
    for (const t of e.touches){// 各指の開始位置と最新位置を更新
      if(!gesture.starts[t.identifier]) gesture.starts[t.identifier] = {x:t.clientX, y:t.clientY};
      gesture.lastPositions[t.identifier] = {x:t.clientX, y:t.clientY};
      gesture.last = {x:t.clientX, y:t.clientY};
    }
    gesture.lastCenter = calcCenterFromTouches(e.touches) || gesture.lastCenter;
    if(e.touches.length>=2) gesture.lastDist = distance(e.touches[0], e.touches[1]);
  }
  // 長押しの判定
  if (
    gesture &&
    gesture.count >= 1 && gesture.count <= 3 &&   // 1〜3本指
    gesture.maxTouches === gesture.count &&       // 途中で増えていない
    e.touches.length === gesture.count            // 現在も同じ本数
  ){
    clearTimeout(longPressTimer);
    // LONG_PRESS_MSたったら長押しとみなす
    longPressTimer = setTimeout(()=>{
      sendCommand(
        gestureMap[`long_press_${gesture.count}`] || gestureMap.long_press,
        `long_press_${gesture.count}`
      );
      gesture = null;
    }, LONG_PRESS_MS);
  } else {
    clearTimeout(longPressTimer);
  }
}
, {passive:true});

// タッチ移動イベント
canvas.addEventListener('touchmove', (e)=>{
  updateTouchIndicators(e.touches);
  if(gesture && e.touches.length > 0){
    const t = e.touches[0];
    gesture.last = {x:t.clientX, y:t.clientY};
    gesture.maxTouches = Math.max(gesture.maxTouches, e.touches.length);
    for (const tt of e.touches){
      gesture.lastPositions[tt.identifier] = {x:tt.clientX, y:tt.clientY};
    }
    gesture.lastCenter = calcCenterFromTouches(e.touches) || gesture.lastCenter;
    if(e.touches.length>=2) gesture.lastDist = distance(e.touches[0], e.touches[1]);
  }
  if(gesture && (gesture.maxTouches > 1 || e.touches.length > 1)) clearTimeout(longPressTimer);
}, {passive:true});

// タッチ終了イベント
canvas.addEventListener('touchend', async (e)=>{
  updateTouchIndicators(e.touches);
  clearTimeout(longPressTimer);

  if(!gesture) return;// ジェスチャー状態がない場合は何もしない
  if(e.touches.length > 0) return;// まだ指が残っている場合はジェスチャーを確定しない

  // ピンチ優先
  const pinch = detectPinch(gesture);
  if(pinch){
    sendCommand(gestureMap[pinch], pinch);
    gesture = null;
    return;
  }
  // その他のジェスチャー
  const result = classifyGesture(gesture);

  if(result instanceof Promise){
    const key = await result;
    sendCommand(gestureMap[key], key);
  } else {
    sendCommand(gestureMap[result], result);
  }

  gesture = null;
}, {passive:true});

// タッチキャンセルイベント（例: システムによる割り込みなど）
canvas.addEventListener('touchcancel', (e)=>{
  updateTouchIndicators(e.touches);
  clearTimeout(longPressTimer);
  gesture = null;
}, {passive:true});

connect();
</script>
