<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>LeftPad Gesture</title>
  <style>
    :root { --bg:#0d0e11; --surface:#16181e; --border:#2a2d36; --accent:#e8ff47; --accent2:#47c4ff; --text:#e4e6ee; --muted:#5a5f72; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin:0; background:var(--bg); color:var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    header { display:flex; justify-content:space-between; align-items:center; padding:14px 16px; border-bottom:1px solid var(--border); }
    .title { color:var(--accent); font-weight:700; font-size:22px; letter-spacing:1px; }
    .status { display:flex; gap:8px; align-items:center; color:var(--muted); font-size:12px; }
    .dot { width:10px; height:10px; border-radius:999px; background:var(--muted); }
    .dot.on { background:#4dff91; box-shadow:0 0 8px #4dff9180; }

    main { padding:12px; display:flex; flex-direction:column; gap:12px; }
    #gesture-canvas { position:relative; height:58dvh; min-height:320px; background:var(--surface); border:1px solid var(--border); touch-action:none; overflow:hidden; }
    .hint { position:absolute; color:var(--muted); font-size:11px; letter-spacing:1px; }
    .top{top:8px;left:50%;transform:translateX(-50%)} .bottom{bottom:8px;left:50%;transform:translateX(-50%)}
    .left{left:8px;top:50%;transform:translateY(-50%)} .right{right:8px;top:50%;transform:translateY(-50%)}
    #feedback { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.9); opacity:0; background:var(--accent); color:#000; padding:10px 18px; border-radius:999px; font-weight:700; transition:.12s; }
    #feedback.show { opacity:1; transform:translate(-50%,-50%) scale(1); }
    .touch-indicator {
      position: absolute;
      width: 34px; height: 34px; margin-left: -17px; margin-top: -17px;
      border-radius: 999px; border: 2px solid var(--accent2);
      background: #47c4ff33;
      pointer-events: none;
      transform: scale(0.9);
      transition: transform .08s, opacity .12s;
      opacity: 1;
    }
    .touch-indicator.up {
      opacity: 0;
      transform: scale(1.25);
    }

    .panel { background:var(--surface); border:1px solid var(--border); padding:10px; }
    .panel h3 { margin:0 0 8px; color:var(--accent2); font-size:13px; }
    table { width:100%; border-collapse:collapse; font-size:12px; }
    td,th { border-bottom:1px solid var(--border); padding:6px; text-align:left; }
    tr:last-child td{border-bottom:none}
    input { width:100%; background:#1e2128; color:var(--text); border:1px solid var(--border); padding:6px; }
  </style>
</head>
<body>
  <header>
    <div class="title">LEFTPAD / GESTURE</div>
    <div class="status"><span id="state">接続中...</span><span id="dot" class="dot"></span></div>
  </header>

  <main>
    <section id="gesture-canvas">
      <span class="hint top">UP</span><span class="hint bottom">DOWN</span><span class="hint left">LEFT</span><span class="hint right">RIGHT</span>
      <div id="feedback"></div>
    </section>

    <section class="panel">
      <h3>ジェスチャー割り当て（コマンド名）</h3>
      <table><thead><tr><th>操作</th><th>コマンド</th></tr></thead><tbody id="gesture-map-body"></tbody></table>
    </section>
  </main>

<script>
const token = new URLSearchParams(location.search).get('token') || '';
const wsHost = location.hostname || location.host.split(':')[0];
const wsUrl = `ws://${wsHost}:8765`;
let ws = null, isAuthed = false;
const stateEl = document.getElementById('state');
const dotEl = document.getElementById('dot');
const feedbackEl = document.getElementById('feedback');
const gestureMapBody = document.getElementById('gesture-map-body');

const GESTURE_LABELS = {
  swipe_up:'上スワイプ', swipe_down:'下スワイプ', swipe_left:'左スワイプ', swipe_right:'右スワイプ',
  long_press:'長押し', hold_screen:'画面ホールド', pinch_in:'ピンチイン', pinch_out:'ピンチアウト', double_tap:'ダブルタップ',
  two_finger_tap:'二本指タップ', two_finger_swipe_up:'二本指上スワイプ', two_finger_swipe_down:'二本指下スワイプ',
  two_finger_swipe_left:'二本指左スワイプ', two_finger_swipe_right:'二本指右スワイプ', three_finger_tap:'三本指タップ',
  three_finger_swipe_up:'三本指上スワイプ', three_finger_swipe_down:'三本指下スワイプ', three_finger_swipe_left:'三本指左スワイプ', three_finger_swipe_right:'三本指右スワイプ'
};

let gestureMap = {};
function setConn(ok,msg){ stateEl.textContent=msg; dotEl.className = ok ? 'dot on':'dot'; }
function flash(t){ feedbackEl.textContent=t; feedbackEl.classList.add('show'); setTimeout(()=>feedbackEl.classList.remove('show'),280); }
function send(obj){ if(ws && ws.readyState===1 && isAuthed) ws.send(JSON.stringify(obj)); }
function sendCommand(cmd){ if(!cmd) return; send({cmd}); flash(cmd); }

function connect(){
  ws = new WebSocket(wsUrl);
  setConn(false,'接続中...');
  ws.onopen = ()=> ws.send(JSON.stringify({type:'auth', token}));
  ws.onmessage = (e)=>{
    let d; try{d=JSON.parse(e.data)}catch{return}
    if(d.type==='auth'){ isAuthed=!!d.ok; setConn(isAuthed, isAuthed?'接続済み':'認証失敗'); if(isAuthed) send({type:'get_gestures'}); return; }
    if(d.type==='gestures'){ gestureMap = d.data || {}; renderMap(); }
  };
  ws.onclose = ()=>{ isAuthed=false; setConn(false,'未接続'); setTimeout(connect, 1500); };
}

function renderMap(){
  gestureMapBody.innerHTML = '';
  Object.keys(GESTURE_LABELS).forEach((k)=>{
    const tr=document.createElement('tr');
    const td1=document.createElement('td'); td1.textContent=GESTURE_LABELS[k];
    const td2=document.createElement('td');
    const input=document.createElement('input'); input.value=gestureMap[k]||'';
    input.onchange = ()=>{ gestureMap[k]=input.value.trim(); send({type:'update_gesture', gesture:k, cmd:gestureMap[k]}); };
    td2.appendChild(input); tr.append(td1,td2); gestureMapBody.appendChild(tr);
  });
}

const canvas = document.getElementById('gesture-canvas');
let start=null, startTime=0, longPressTimer=null;
const touchIndicators = new Map();

function updateTouchIndicators(touchList){
  const activeIds = new Set();
  for(const t of touchList){
    activeIds.add(t.identifier);
    let el = touchIndicators.get(t.identifier);
    if(!el){
      el = document.createElement('div');
      el.className = 'touch-indicator';
      canvas.appendChild(el);
      touchIndicators.set(t.identifier, el);
    }
    const rect = canvas.getBoundingClientRect();
    el.style.left = `${t.clientX - rect.left}px`;
    el.style.top = `${t.clientY - rect.top}px`;
  }
  for(const [id, el] of touchIndicators.entries()){
    if(!activeIds.has(id)){
      el.classList.add('up');
      setTimeout(()=>el.remove(), 140);
      touchIndicators.delete(id);
    }
  }
}

canvas.addEventListener('touchstart', (e)=>{
  updateTouchIndicators(e.touches);
  if(e.touches.length===1){
    const t=e.touches[0]; start={x:t.clientX,y:t.clientY,count:1}; startTime=Date.now();
    clearTimeout(longPressTimer);
    longPressTimer=setTimeout(()=>{ sendCommand(gestureMap.long_press||gestureMap.hold_screen); }, 550);
  } else if(e.touches.length===2 || e.touches.length===3){
    const t=e.touches[0]; start={x:t.clientX,y:t.clientY,count:e.touches.length}; startTime=Date.now();
  }
}, {passive:true});

canvas.addEventListener('touchmove', (e)=>{
  updateTouchIndicators(e.touches);
}, {passive:true});

canvas.addEventListener('touchend', (e)=>{
  updateTouchIndicators(e.touches);
  clearTimeout(longPressTimer);
  if(!start) return;
  const dt = Date.now()-startTime;
  const t = (e.changedTouches && e.changedTouches[0]) ? e.changedTouches[0] : null;
  const endX = t ? t.clientX : start.x;
  const endY = t ? t.clientY : start.y;
  const dx=endX-start.x, dy=endY-start.y;
  const adx=Math.abs(dx), ady=Math.abs(dy);

  let key='';
  if(start.count===1){
    if(adx<25 && ady<25 && dt<240) key='double_tap';
    else key = adx>ady ? (dx>0?'swipe_right':'swipe_left') : (dy>0?'swipe_down':'swipe_up');
  } else if(start.count===2){
    if(adx<30 && ady<30) key='two_finger_tap';
    else key = adx>ady ? (dx>0?'two_finger_swipe_right':'two_finger_swipe_left') : (dy>0?'two_finger_swipe_down':'two_finger_swipe_up');
  } else if(start.count===3){
    if(adx<30 && ady<30) key='three_finger_tap';
    else key = adx>ady ? (dx>0?'three_finger_swipe_right':'three_finger_swipe_left') : (dy>0?'three_finger_swipe_down':'three_finger_swipe_up');
  }
  sendCommand(gestureMap[key]);
  start=null;
}, {passive:true});

canvas.addEventListener('touchcancel', (e)=>{
  updateTouchIndicators(e.touches);
  clearTimeout(longPressTimer);
  start = null;
}, {passive:true});

connect();
</script>
</body>
</html>
